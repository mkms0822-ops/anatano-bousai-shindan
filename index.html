    background-size:cover;background-position:center;background-repeat:no-repeat;
  }
  .wrap{max-width:560px;margin:0 auto;padding:22px 18px 40px;position:relative;z-index:0;}

  /* ---------- ヘッダー ---------- */
  .app{
    display:flex;align-items:center;gap:12px;margin-bottom:20px;
  }
  .app .logo{
    width:46px;height:46px;border-radius:13px;flex:0 0 auto;
    background:linear-gradient(150deg,#3ddc97,#2bb3ff);
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);
  }
  .app .logo svg{width:27px;height:27px;}
  /* タイトル文字の背景だけ、半透明の暗いグラデーションを敷いて可読性を確保 */
  .app .app-text{
    background:linear-gradient(135deg, rgba(15,27,45,.78) 0%, rgba(15,27,45,.62) 100%);
    padding:8px 14px;border-radius:12px;backdrop-filter:blur(2px);
  }
  .app .ttl{font-size:19px;font-weight:800;letter-spacing:.01em;}
  .app .sub{font-size:12px;color:var(--muted);margin-top:1px;}

  /* ---------- カード ---------- */
  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:24px 22px;box-shadow:var(--shadow);
  }

  /* ---------- スタート画面 ---------- */
  .intro-eyebrow{
    font-size:12px;font-weight:700;letter-spacing:.18em;color:var(--safe);
    text-transform:uppercase;margin-bottom:10px;
  }
  .intro-title{font-size:27px;font-weight:800;line-height:1.3;margin:0 0 14px;letter-spacing:.01em;}
  .intro-title .accent{
    background:linear-gradient(transparent 62%, rgba(61,220,151,.35) 62%);
  }
  .intro-lead{font-size:14px;color:var(--muted);margin:0 0 18px;}
  .intro-meta{
    display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;
  }
  .meta-chip{
    display:flex;align-items:center;gap:7px;
    background:var(--panel-soft);border:1px solid var(--line);border-radius:11px;
    padding:9px 12px;font-size:12.5px;color:var(--ink);font-weight:600;
  }
  .meta-chip svg{width:17px;height:17px;color:var(--safe);}
  .btn-primary{
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    border:none;cursor:pointer;font:inherit;font-weight:800;font-size:17px;
    color:#06231a;background:linear-gradient(135deg,#3ddc97,#34c8b0);
    border-radius:14px;padding:16px;box-shadow:var(--shadow);
    transition:transform .08s ease, filter .15s ease;
  }
  .btn-primary:hover{filter:brightness(1.05);}
  .btn-primary:active{transform:translateY(1px);}
  .btn-primary svg{width:21px;height:21px;}
  .intro-note{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.7;}

  /* ---------- 進捗 ---------- */
  .progress-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .progress-track{
    flex:1;height:8px;background:var(--panel-soft);border-radius:999px;overflow:hidden;
    border:1px solid var(--line);
  }
  .progress-fill{
    height:100%;border-radius:999px;width:0;
    background:linear-gradient(90deg,#3ddc97,#4da8ff);transition:width .35s ease;
  }
  .progress-count{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;}

  /* ---------- 質問 ---------- */
  .q-cat{
    display:inline-flex;align-items:center;gap:6px;
    font-size:11px;font-weight:700;letter-spacing:.04em;border-radius:999px;
    padding:4px 11px;margin-bottom:12px;
  }
  .q-cat.prep{background:rgba(77,168,255,.16);color:var(--blue);}
  .q-cat.act{background:rgba(255,210,63,.16);color:var(--accent);}
  .q-text{font-size:20px;font-weight:800;line-height:1.45;margin:0 0 20px;}
  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{
    display:flex;align-items:center;gap:13px;width:100%;text-align:left;
    background:var(--panel-soft);border:1.5px solid var(--line);border-radius:14px;
    padding:15px 15px;cursor:pointer;font:inherit;color:var(--ink);
    transition:border-color .12s, background .12s, transform .06s;
  }
  .opt:hover{border-color:var(--safe);}
  .opt:active{transform:scale(.99);}
  .opt .dot{
    width:22px;height:22px;border-radius:50%;flex:0 0 auto;
    border:2px solid var(--line);transition:all .12s;
    display:flex;align-items:center;justify-content:center;
  }
  .opt.sel{border-color:var(--safe);background:rgba(61,220,151,.10);}
  .opt.sel .dot{border-color:var(--safe);background:var(--safe);}
  .opt.sel .dot svg{width:13px;height:13px;color:#06231a;}
  .opt .lbl{font-size:15px;font-weight:600;line-height:1.4;}
  .q-nav{display:flex;gap:10px;margin-top:20px;}
  .btn-ghost{
    border:1px solid var(--line);background:none;color:var(--muted);
    font:inherit;font-size:14px;font-weight:700;padding:13px 18px;border-radius:13px;cursor:pointer;
  }
  .btn-ghost:hover{border-color:var(--accent);color:var(--ink);}
  .btn-ghost:disabled{opacity:.4;cursor:default;}
  .q-nav .spacer{flex:1;}

  /* ---------- 結果 ---------- */
  .result-hero{text-align:center;padding:6px 0 4px;}
  .result-eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
  .gauge{position:relative;width:170px;height:170px;margin:0 auto 8px;}
  .gauge svg{transform:rotate(-90deg);}
  .gauge .gv{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .gauge .score{font-size:42px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
  .gauge .smax{font-size:13px;color:var(--muted);margin-top:3px;}
  .stars{font-size:22px;letter-spacing:3px;margin:6px 0 2px;}
  .level-name{font-size:15px;font-weight:700;color:var(--safe);}
  .type-badge{
    display:inline-block;margin:18px 0 4px;padding:7px 16px;border-radius:999px;
    background:var(--panel-soft);border:1px solid var(--line);
    font-size:13px;font-weight:700;color:var(--muted);
  }
  .type-name{font-size:25px;font-weight:800;margin:6px 0 12px;line-height:1.3;}
  .type-desc{font-size:14px;color:var(--ink);line-height:1.8;margin:0 0 8px;text-align:left;}

  .breakdown{margin:22px 0 6px;}
  .bd-h{font-size:13px;font-weight:700;color:var(--ink);margin:18px 0 11px;padding-left:9px;border-left:3px solid var(--safe);}
  .bd-row{margin-bottom:13px;}
  .bd-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .bd-label{font-size:13.5px;font-weight:700;}
  .bd-val{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .bd-track{height:9px;background:var(--panel-soft);border:1px solid var(--line);border-radius:999px;overflow:hidden;}
  .bd-bar{height:100%;border-radius:999px;width:0;transition:width .6s ease;}

  .advice{
    background:var(--panel-soft);border:1px solid var(--line);border-radius:14px;
    padding:15px 16px;margin-top:8px;
  }
  .advice-h{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;margin-bottom:10px;}
  .advice-h svg{width:19px;height:19px;color:var(--accent);}
  .advice ul{margin:0;padding-left:20px;}
  .advice li{font-size:13.5px;line-height:1.75;margin-bottom:8px;color:var(--ink);}
  .advice li:last-child{margin-bottom:0;}
  .advice li b{color:var(--safe);}

  .result-actions{display:flex;flex-direction:column;gap:10px;margin-top:22px;}
  .btn-line{
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    border:1px solid var(--line);background:var(--panel-soft);color:var(--ink);
    font:inherit;font-weight:700;font-size:15px;padding:14px;border-radius:14px;cursor:pointer;
  }
  .btn-line:hover{border-color:var(--safe);}
  .btn-line svg{width:19px;height:19px;color:var(--safe);}
  .disclaimer{font-size:11px;color:var(--muted);line-height:1.7;text-align:center;margin-top:16px;}

  /* フェード */
  .fade{animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* トースト */
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:#0c1828;border:1px solid var(--line);color:var(--ink);
    padding:12px 18px;border-radius:12px;font-size:13px;box-shadow:var(--shadow);
    opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:420px){
    .intro-title{font-size:24px;}
    .q-text{font-size:18px;}
    .type-name{font-size:22px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="app">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#06231a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

<script>
/* ===== アイコン ===== */
const I = {

/* ===== 質問データ =====
   cat: 'prep'(備え) / 'act'(行動)

const QUESTIONS = [
  // ---- 備え（prep）7問 ----

    opts:[

      {l:'1〜2日分くらいはある', s:2},
      {l:'少しはあるが、量は意識していない', s:1},
      {l:'特に用意していない', s:0},
    ]},
  { cat:'prep', axis:'bag', q:'非常用の持ち出し袋は？',

    ]},
  { cat:'prep', axis:'furniture', q:'家具・家電の転倒防止対策は？',
    opts:[
      {l:'背の高い家具やテレビをしっかり固定している', s:3},
      {l:'一部だけ固定している', s:2},
      {l:'必要だと思うが、まだやっていない', s:1},
      {l:'特に何もしていない', s:0},
    ]},
  { cat:'prep', axis:'stock', q:'停電・断水への備え（懐中電灯・モバイルバッテリー・カセットコンロ等）は？',
    opts:[

      {l:'懐中電灯など最低限はある', s:2},
      {l:'スマホのライトで何とかなると思っている', s:1},
      {l:'特に備えていない', s:0},
    ]},
  { cat:'prep', axis:'med', q:'常備薬・救急用品・衛生用品（トイレ含む）の備えは？',
    opts:[
      {l:'救急セットと簡易トイレ、生理用品等まで用意している', s:3},

      {l:'家にある物で足りると思っている', s:1},

    ]},
  { cat:'prep', axis:'info', q:'ハザードマップで自宅周辺の危険（浸水・土砂・津波等）を確認したことは？',
    opts:[
      {l:'確認し、自宅のリスクを具体的に把握している', s:3},
      {l:'見たことはあるが、内容はうろ覚え', s:2},
      {l:'存在は知っているが見ていない', s:1},
      {l:'ハザードマップを知らない', s:0},
    ]},
  { cat:'prep', axis:'family', q:'家族や同居人との「連絡・集合のルール」は？',
    opts:[
      {l:'集合場所と連絡手段を具体的に決めてある', s:3},
      {l:'何となく話したことはある', s:2},
      {l:'必要だと思うが決めていない', s:1},
      {l:'考えたことがない／一人暮らしで未検討', s:0},
    ]},
  // ---- 行動・判断（act）6問 ----
  { cat:'act', axis:'quake', q:'大きな地震の揺れを今この瞬間に感じたら、まず何をする？',
    opts:[
      {l:'頭を守り、机の下など安全な場所で揺れが収まるのを待つ', s:3},
      {l:'すぐ火を消しに行く／外へ逃げ出す', s:1},
      {l:'とりあえずその場で固まってしまう', s:1},
      {l:'どうすればよいか分からない', s:0},
    ]},
  { cat:'act', axis:'evac', q:'「警戒レベル4・避難指示」が出たときの行動は？',
    opts:[
      {l:'危険な場所から全員速やかに避難する', s:3},
      {l:'様子を見て、危なそうなら逃げる', s:1},
      {l:'これまで大丈夫だったので家にとどまる', s:0},
      {l:'警戒レベルの意味がよく分からない', s:0},
    ]},
  { cat:'act', axis:'info', q:'災害時、信頼できる情報をどこから得るか決めている？',
    opts:[
      {l:'気象庁・自治体・NHK等、確認先を複数決めている', s:3},
      {l:'テレビかネットを見れば分かると思う', s:2},
      {l:'SNSで流れてくる情報を見る', s:1},
      {l:'特に決めていない', s:0},
    ]},
  { cat:'act', axis:'evac', q:'自宅から避難場所までの経路を実際に歩いて確認したことは？',
    opts:[
      {l:'経路を歩き、危険箇所や所要時間も把握している', s:3},
      {l:'場所は知っているが、歩いて確かめてはいない', s:2},
      {l:'だいたいの方向だけ分かる', s:1},
      {l:'避難場所を知らない', s:0},
    ]},
  { cat:'act', axis:'med', q:'目の前で人が倒れて反応がないとき、対応できる？',
    opts:[
      {l:'119番・AED手配・胸骨圧迫の流れを実行できる', s:3},
      {l:'手順は知っているが、実際は自信がない', s:2},
      {l:'救急車を呼ぶことくらいはできる', s:1},
      {l:'何もできる気がしない', s:0},
    ]},
  { cat:'act', axis:'family', q:'近所づきあい・地域の防災訓練への関わりは？',
    opts:[
      {l:'訓練に参加し、近所と顔の見える関係がある', s:3},
      {l:'挨拶する程度のつながりはある', s:2},
      {l:'ほとんど関わりがない', s:1},
      {l:'地域に防災の動きがあるか知らない', s:0},
    ]},
];

const MAX_SCORE = QUESTIONS.reduce((a,q)=>a+Math.max(...q.opts.map(o=>o.s)),0); // 39

/* ===== レベル（合計点 → 4段階） ===== */
function levelOf(pct){
  if(pct>=80) return {stars:4, name:'防災レベル：高い', color:'#3ddc97'};
  if(pct>=55) return {stars:3, name:'防災レベル：まずまず', color:'#4da8ff'};
  if(pct>=30) return {stars:2, name:'防災レベル：これから', color:'#ffd23f'};
  return {stars:1, name:'防災レベル：要対策', color:'#ff5a5f'};
}

/* ===== タイプ判定（備えスコア率 × 行動スコア率） ===== */
function typeOf(prepPct, actPct){
  const hi = 60; // この率以上を「高い」とみなす
  const pHi = prepPct>=hi, aHi = actPct>=hi;
  if(pHi && aHi) return {
    badge:'BALANCED', name:'頼れる防災マスター型',
    desc:'モノの備えも、いざというときの判断・行動も、バランスよく身についています。あなた自身が家族や地域の「もしも」を支えられる存在。今の状態を保ちつつ、備蓄の期限チェックや家族との再確認など、メンテナンスを習慣にしていきましょう。'
  };
  if(!pHi && aHi) return {
    badge:'KNOW-HOW',  name:'知識先行・行動派型',
    desc:'災害時にどう動くか、情報をどう取るかといった「判断力」は高めです。一方で、水・食料・持ち出し袋など実際のモノの備えが追いついていない様子。知識を活かすには道具も必要です。まずは3日分の備蓄と持ち出し袋から、形にしていきましょう。'
  };
  if(pHi && !aHi) return {
    badge:'STOCKER', name:'備蓄しっかり・実践これから型',
    desc:'必要なモノはしっかりそろえられています。あとは「いざというとき、それを使って動けるか」。避難経路を歩いて確かめる、家族と集合ルールを決める、応急手当を一度体験する——備えを“使える力”に変えると一気に盤石になります。'
  };
  return {
    badge:'STARTER', name:'これからスタート型',
    desc:'防災はこれからが伸びしろ。完璧を目指す必要はありません。「水を3日分」「家具を1つ固定」「ハザードマップを見る」——どれか一つで十分です。小さな一歩が、いざというときの大きな差になります。今日できることから始めましょう。'
  };
}

/* ===== 分野ラベル ===== */
const AXIS_LABEL = {
  stock:'備蓄（水・食料・電源）', bag:'持ち出し袋', furniture:'家具の固定',
  med:'救急・衛生', info:'情報・ハザード把握', family:'家族・地域の連携',
  quake:'地震時の初動', evac:'避難の判断・経路',
};

/* ===== 状態 ===== */
let answers = new Array(QUESTIONS.length).fill(null); // 各問の「選んだ選択肢オブジェクト」を保持
let idx = 0;
let displayOpts = [];   // 現在表示中の選択肢（シャッフル後の並び）
const view = document.getElementById('view');

/* 配列をその場でシャッフル（Fisher–Yates） */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ===== スタート画面 ===== */
function renderIntro(){
  view.innerHTML = `
    <div class="card fade">
      <div class="intro-eyebrow">SELF CHECK</div>
      <h1 class="intro-title">あなたの<span class="accent">防災力</span>は<br>いま何点？</h1>
      <p class="intro-lead">13の質問に答えるだけ。「モノの備え」と「いざというときの行動力」の2つの面から、あなたの防災意識を点数とタイプで診断します。</p>
      <div class="intro-meta">
        <span class="meta-chip">${I.list}<span>全13問</span></span>
        <span class="meta-chip">${I.clock}<span>約2分</span></span>
        <span class="meta-chip">${I.lock}<span>記録は残りません</span></span>
      </div>
      <button class="btn-primary" onclick="start()">${I.play}<span>診断をはじめる</span></button>
      <p class="intro-note">回答や結果は端末の外に送信されず、どこにも保存されません。<br>結果はあくまで意識づけの目安です。</p>
    </div>`;
}

function start(){ answers = new Array(QUESTIONS.length).fill(null); idx = 0; renderQuestion(); }

/* ===== 質問画面 ===== */
function renderQuestion(reshuffle=true){
  const q = QUESTIONS[idx];
  // 開くたびに選択肢の並びをランダムにする
  if(reshuffle || !displayOpts.length){ displayOpts = shuffle(q.opts); }
  const pct = Math.round((idx)/QUESTIONS.length*100);
  const catLabel = q.cat==='prep'
    ? `<span class="q-cat prep">🎒 備えについて</span>`
    : `<span class="q-cat act">⚡ 行動・判断について</span>`;
  const opts = displayOpts.map((o,i)=>{
    const isSel = answers[idx]===o;
    const sel = isSel ? ' sel' : '';
    return `<button class="opt${sel}" onclick="choose(${i})">
      <span class="dot">${isSel?I.check:''}</span>
      <span class="lbl">${o.l}</span>
    </button>`;
  }).join('');
  view.innerHTML = `
    <div class="fade">
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-count">${idx+1} / ${QUESTIONS.length}</div>
      </div>
      <div class="card">
        ${catLabel}
        <h2 class="q-text">${q.q}</h2>
        <div class="opts">${opts}</div>
        <div class="q-nav">
          <button class="btn-ghost" onclick="prev()" ${idx===0?'disabled':''}>‹ もどる</button>
          <span class="spacer"></span>
        </div>
      </div>
    </div>`;
}

function choose(i){
  answers[idx] = displayOpts[i];   // 選んだ選択肢オブジェクトを保存（並び順に依存しない）
  // 選択のハイライトは innerHTML を作り直さず、その場でクラスを付け替える
  // （作り直すと .fade が再生されて画面がフラッシュするため）
  const btns = view.querySelectorAll('.opt');
  btns.forEach((b,bi)=>{
    if(bi===i){
      b.classList.add('sel');
      const dot = b.querySelector('.dot');
      if(dot && !dot.innerHTML.trim()) dot.innerHTML = I.check;
    } else {
      b.classList.remove('sel');
      const dot = b.querySelector('.dot');
      if(dot) dot.innerHTML = '';
    }
  });
  // 少し間をおいて次の問題へ（最後の問題なら結果へ）。ここで初めて画面を切り替える。
  setTimeout(()=>{
    if(idx < QUESTIONS.length-1){ idx++; renderQuestion(true); }   // 次の問題は新たにシャッフル
    else { renderResult(); }
  }, 230);
}
function prev(){ if(idx>0){ idx--; renderQuestion(true); } }   // 前の問題に戻るときも並びをシャッフル

/* ===== 結果画面 ===== */
function renderResult(){
  // 集計
  let total=0, prepTotal=0, prepMax=0, actTotal=0, actMax=0;
  const axisScore={}, axisMax={};
  QUESTIONS.forEach((q,qi)=>{
    const chosen = answers[qi];
    const s = chosen==null ? 0 : chosen.s;
    const mx = Math.max(...q.opts.map(o=>o.s));
    total += s;
    if(q.cat==='prep'){ prepTotal+=s; prepMax+=mx; } else { actTotal+=s; actMax+=mx; }
    axisScore[q.axis]=(axisScore[q.axis]||0)+s;
    axisMax[q.axis]=(axisMax[q.axis]||0)+mx;
  });
  const pct = Math.round(total/MAX_SCORE*100);
  const prepPct = Math.round(prepTotal/prepMax*100);
  const actPct = Math.round(actTotal/actMax*100);
  const lv = levelOf(pct);
  const ty = typeOf(prepPct, actPct);

  // ゲージ（円）
  const R=74, C=2*Math.PI*R, off=C*(1-pct/100);
  const gauge = `
    <div class="gauge">
      <svg width="170" height="170" viewBox="0 0 170 170">
        <circle cx="85" cy="85" r="${R}" fill="none" stroke="#1d3149" stroke-width="13"/>
        <circle cx="85" cy="85" r="${R}" fill="none" stroke="${lv.color}" stroke-width="13"
          stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${C.toFixed(1)}"
          id="gaugeArc"/>
      </svg>
      <div class="gv">
        <div class="score" style="color:${lv.color}">${pct}</div>
        <div class="smax">点 / 100</div>
      </div>
    </div>`;

  const stars = '★★★★★☆☆☆☆☆'.slice(5-lv.stars, 10-lv.stars);

  // 分野バー
  const order=['stock','bag','furniture','med','info','family','quake','evac'];
  const bars = order.filter(a=>axisMax[a]).map(a=>{
    const p=Math.round(axisScore[a]/axisMax[a]*100);
    const col = p>=70?'#3ddc97':p>=40?'#ffd23f':'#ff5a5f';
    return `<div class="bd-row">
      <div class="bd-top"><span class="bd-label">${AXIS_LABEL[a]}</span><span class="bd-val">${p}%</span></div>
      <div class="bd-track"><div class="bd-bar" data-w="${p}" style="background:${col}"></div></div>
    </div>`;
  }).join('');

  // アドバイス（弱い分野 上位3つ）
  const weak = order.filter(a=>axisMax[a])
    .map(a=>({a, p:axisScore[a]/axisMax[a]}))
    .sort((x,y)=>x.p-y.p).slice(0,3).filter(x=>x.p<1);
  const tips = weak.length ? weak.map(w=>`<li>${ADVICE[w.a]}</li>`).join('')
    : `<li>すべての分野でしっかり備えられています。<b>備蓄の期限や持ち出し袋の中身を、半年に一度見直す</b>習慣を続けましょう。</li>`;

  view.innerHTML = `
    <div class="fade">
      <div class="card">
        <div class="result-hero">
          <div class="result-eyebrow">あなたの診断結果</div>
          ${gauge}
          <div class="stars" style="color:${lv.color}">${stars}</div>
          <div class="level-name" style="color:${lv.color}">${lv.name}</div>
          <div class="type-badge">TYPE — ${ty.badge}</div>
          <div class="type-name">${ty.name}</div>
        </div>
        <p class="type-desc">${ty.desc}</p>

        <div class="breakdown">
          <div class="bd-h">2つの面のバランス</div>
          <div class="bd-row">
            <div class="bd-top"><span class="bd-label">🎒 モノの備え</span><span class="bd-val">${prepPct}%</span></div>
            <div class="bd-track"><div class="bd-bar" data-w="${prepPct}" style="background:#4da8ff"></div></div>
          </div>
          <div class="bd-row">
            <div class="bd-top"><span class="bd-label">⚡ 行動・判断力</span><span class="bd-val">${actPct}%</span></div>
            <div class="bd-track"><div class="bd-bar" data-w="${actPct}" style="background:#ffd23f"></div></div>
          </div>

          <div class="bd-h">分野別のスコア</div>
          ${bars}
        </div>

        <div class="advice">
          <div class="advice-h">${I.bulb}<span>今日からできる、次の一歩</span></div>
          <ul>${tips}</ul>
        </div>

        <div class="result-actions">
          <button class="btn-line" onclick="shareResult(${pct}, '${ty.name}')">${I.share}<span>結果をシェアする</span></button>
          <button class="btn-line" onclick="renderIntro()">${I.redo}<span>もう一度診断する</span></button>
        </div>
        <p class="disclaimer">この診断は防災意識を見直すための簡易的な目安です。実際の備えは、お住まいの自治体やハザードマップ、消防庁などの公式情報もあわせてご確認ください。</p>
      </div>
    </div>`;

  // アニメーション（次フレームで値を入れて動かす）
  requestAnimationFrame(()=>{
    const arc=document.getElementById('gaugeArc');
    if(arc){ arc.style.transition='stroke-dashoffset 1s ease'; arc.style.strokeDashoffset=off.toFixed(1); }
    document.querySelectorAll('.bd-bar').forEach(b=>{ b.style.width=(b.dataset.w||0)+'%'; });
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ===== 分野別アドバイス ===== */
const ADVICE = {
  stock:'<b>水と食料を最低3日分</b>（できれば1週間）。水は1人1日3L、レトルトや缶詰など、ふだん食べる物を少し多めに買い置きする「ローリングストック」が続けやすいです。停電に備え、モバイルバッテリーや乾電池の予備も。',
  bag:'<b>非常用持ち出し袋を用意</b>。水・携帯食・常備薬・モバイルバッテリー・現金・身分証のコピー・簡易トイレなどを玄関近くに。半年に一度は中身と期限を点検しましょう。',
  furniture:'<b>背の高い家具とテレビを固定</b>。L字金具や突っ張り棒、転倒防止マットで。寝る場所に倒れてくる物がないか、配置も見直すと安心です。',
  med:'<b>救急・衛生用品をそろえる</b>。絆創膏・消毒・常備薬に加え、断水に備えた簡易トイレは必須級。生理用品や乳幼児・高齢者向けの物も忘れずに。',
  info:'<b>ハザードマップで自宅のリスク確認</b>。浸水・土砂・津波の危険と、最寄りの避難場所をチェック。災害時の情報源（気象庁・自治体・NHK）も今のうちに決めておきましょう。',

};

/* ===== シェア ===== */
function shareResult(pct, typeName){
  const text = `防災意識診断の結果は ${pct}点・「${typeName}」でした。あなたの防災力もチェック！`;
  if(navigator.share){
    navigator.share({title:'あなたの防災意識診断', text}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast('結果をコピーしました')).catch(()=>showToast('コピーできませんでした'));
  } else {
    showToast(text);
  }
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'), 2200);
}

renderIntro();
